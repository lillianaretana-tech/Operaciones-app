<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Operaciones Estratégicas Plus</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060708; --bg-soft:#0d1012; --card:#12161a; --card-2:#171c21; --line:#2b3239; --line-2:#3b454e;
  --text:#f4f7fb; --muted:#b9c2cc; --muted-2:#8994a0; --green:#1D9E75; --green-soft:#11372d; --amber:#c98b1d;
  --amber-soft:#3b2a10; --red:#d75b5b; --red-soft:#3a181b; --blue:#5aa8ff; --blue-soft:#13283b; --shadow:0 12px 28px rgba(0,0,0,.35)
}
html,body{background:var(--bg);color:var(--text);min-height:100%}
body{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:17px;line-height:1.45}
button,input,select{font:inherit}
button{cursor:pointer}
.app{max-width:560px;margin:0 auto;padding:0 0 110px;background:linear-gradient(180deg,#050607 0%,#0b0e11 100%);min-height:100vh}
.header{padding:18px 16px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(6,7,8,.92);backdrop-filter:blur(14px);z-index:30;box-shadow:0 8px 24px rgba(0,0,0,.22)}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
.header-title{font-size:28px;font-weight:800;letter-spacing:.01em}
.date-info{font-size:14px;color:var(--muted)}
.header-sub{font-size:13px;color:var(--muted-2);margin-top:2px}
.project-select{width:100%;padding:13px 14px;margin-bottom:12px;border:1px solid var(--line-2);border-radius:16px;background:var(--card);color:var(--text);outline:none}
.tab-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.tab{padding:10px 6px;font-size:13px;font-weight:700;border:1px solid var(--line-2);border-radius:14px;background:var(--card);color:var(--muted);transition:all .18s ease;text-align:center}
.tab.active{background:linear-gradient(180deg,#21262b 0%,#171a1f 100%);color:var(--text);border-color:#5c6672}
.tab:hover{transform:translateY(-1px)}
.section{padding:14px 16px 6px}
.section-label{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2);margin-bottom:10px}
.hero{padding:16px}
.hero-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.stat-card,.summary-card,.focus-card,.project-card,.manager-card{background:linear-gradient(180deg,#14181d 0%,#101419 100%);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:var(--shadow)}
.stat-label{font-size:12px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
.stat-value{font-size:28px;font-weight:800;line-height:1.05}
.stat-sub,.mini-sub,.note,.project-stats{font-size:13px;color:var(--muted);margin-top:6px}
.kicker{font-size:12px;color:#8fd8c0;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.mini-title{font-size:19px;font-weight:800}
.summary-block{margin-top:10px;padding:10px 12px;border-radius:14px;background:#0c1115;border:1px solid var(--line)}
.summary-block p{margin-top:5px;color:var(--muted);font-size:14px}
.project-grid{display:grid;gap:10px}
.project-card{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.project-name{font-size:17px;font-weight:700}
.status-pill,.scope-pill{padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800;white-space:nowrap}
.status-risk-low{background:var(--green-soft);color:#9ee6cf}
.status-risk-medium{background:var(--amber-soft);color:#ffd591}
.status-risk-high{background:var(--red-soft);color:#ffb4b4}
.scope-global{background:var(--blue-soft);color:#9ccaff}
.scope-project{background:#231934;color:#d8b9ff}
.scope-multi{background:#17311a;color:#a9e4b1}
.task-card{background:linear-gradient(180deg,#14181d 0%,#101419 100%);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;transition:border-color .15s,transform .15s}
.task-card:hover{border-color:var(--green);transform:translateY(-1px)}
.task-card.done{opacity:.5}
.task-card.overdue{border-color:#5a2a31}
.check{width:25px;height:25px;border-radius:50%;border:2px solid var(--line-2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.check svg{display:none;width:12px;height:12px}
.task-card.done .check{background:var(--green);border-color:var(--green)}
.task-card.done .check svg{display:block}
.task-body{flex:1;min-width:0}
.task-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.task-name{font-size:18px;font-weight:700;line-height:1.35;margin-bottom:4px}
.task-card.done .task-name{text-decoration:line-through;color:var(--muted-2)}
.task-meta{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:800;padding:4px 8px;border-radius:999px;white-space:nowrap}
.badge-week{background:#163027;color:#9ee6cf}
.badge-month{background:#15273d;color:#9ccaff}
.badge-tri{background:#32250f;color:#ffd591}
.badge-urgent{background:#38181b;color:#ffb4b4}
.badge-custom{background:#2c2230;color:#e7c7ff}
.progress-wrap{padding:0 16px 14px}
.progress-bar{height:6px;background:#11161a;border-radius:999px;overflow:hidden;border:1px solid var(--line)}
.progress-fill{height:100%;background:linear-gradient(90deg,#1D9E75,#5ed2ad);border-radius:999px;transition:width .3s}
.progress-text{font-size:12px;color:var(--muted-2);text-align:right;margin-top:6px}
.notify-banner{margin:12px 16px;background:#0f1714;border:1px solid #27493d;border-radius:16px;padding:10px 14px;font-size:13px;color:#9ee6cf;display:flex;align-items:center;gap:8px}
.notify-banner.off{background:var(--card);border-color:var(--line);color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green)}
.dot-gray{background:var(--line-2)}
.empty-state{text-align:center;padding:36px 16px;color:var(--muted);font-size:15px}
.day-header{font-size:14px;font-weight:800;color:var(--muted);padding:10px 16px 4px;display:flex;justify-content:space-between;align-items:center}
.today-chip{font-size:11px;background:#163027;color:#9ee6cf;padding:4px 9px;border-radius:999px;font-weight:800}
.action-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.inline-btn,.danger-btn,.secondary-btn,.primary-btn{border:none;border-radius:14px;padding:11px 14px;font-weight:700}
.inline-btn,.primary-btn{background:linear-gradient(180deg,#1f8e6d 0%,#1D9E75 100%);color:white}
.secondary-btn{background:#171c21;color:var(--text);border:1px solid var(--line)}
.danger-btn{background:#35171b;color:#ffb4b4;border:1px solid #58242d}
.fab-group{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:10px;z-index:25}
.fab{width:54px;height:54px;border-radius:50%;border:none;background:linear-gradient(180deg,#1f8e6d 0%,#1D9E75 100%);display:flex;align-items:center;justify-content:center;box-shadow:0 12px 24px rgba(0,0,0,.28)}
.fab.secondary{background:linear-gradient(180deg,#242a31 0%,#1a1f25 100%);border:1px solid var(--line)}
.fab svg{width:22px;height:22px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#0c1014;border-radius:22px 22px 0 0;width:100%;max-width:560px;padding:20px 16px 24px;max-height:86vh;overflow-y:auto;border:1px solid var(--line);box-shadow:var(--shadow)}
.modal-title{font-size:20px;font-weight:800;margin-bottom:12px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
.close-modal{float:right;background:none;border:none;font-size:24px;color:var(--muted)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:13px;font-weight:800;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.input,.textarea,.multi-select{width:100%;padding:12px 13px;border-radius:14px;background:#13181d;border:1px solid var(--line);color:var(--text);outline:none}
.textarea{min-height:80px;resize:vertical}
.radio-row,.choice-grid,.project-checks,.manager-actions{display:flex;gap:8px;flex-wrap:wrap}
.chip-btn,.project-chip{padding:9px 11px;border-radius:999px;background:#151b21;color:var(--muted);border:1px solid var(--line);font-size:13px}
.chip-btn.active,.project-chip.active{background:#193b31;color:#a9e4d5;border-color:#2d7b61}
.manager-card{padding:12px;margin-bottom:10px}
.manager-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.manager-name{font-size:16px;font-weight:800}
.manager-meta{font-size:13px;color:var(--muted);margin-top:6px}
.manager-actions{margin-top:10px}
hr.sep{border:none;border-top:1px solid var(--line);margin:14px 0}
@media (max-width:430px){
  .hero-grid{grid-template-columns:1fr}
  .tab-bar{grid-template-columns:repeat(3,1fr)}
  .tab-bar .tab:last-child,.tab-bar .tab:nth-last-child(2){grid-column:span 1}
}

.fab-stack{position:fixed;right:18px;bottom:20px;display:flex;flex-direction:column;gap:12px;z-index:9999}
.fab-main,.fab-secondary{
  width:58px;height:58px;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 14px 28px rgba(0,0,0,.42), 0 4px 10px rgba(0,0,0,.28);transition:transform .15s ease,opacity .2s ease
}
.fab-main:hover,.fab-secondary:hover{transform:translateY(-2px) scale(1.02)}
.fab-main{background:linear-gradient(180deg,#25b98d 0%,#1D9E75 100%);color:#fff;font-size:30px;font-weight:800}
.fab-secondary{background:linear-gradient(180deg,#20262c 0%,#15191e 100%);color:#fff;font-size:22px}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);display:none;align-items:flex-end;justify-content:center;z-index:10000}
.sheet-overlay.open{display:flex}
.sheet{
  width:100%;max-width:520px;background:linear-gradient(180deg,#11161b 0%,#0d1116 100%);border-top-left-radius:24px;border-top-right-radius:24px;
  border:1px solid var(--line);box-shadow:0 -20px 40px rgba(0,0,0,.45);padding:18px 16px 22px;max-height:88vh;overflow:auto
}
.sheet-handle{width:54px;height:6px;border-radius:999px;background:#3a434d;margin:0 auto 14px}
.sheet-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
.sheet-title{font-size:22px;font-weight:800}
.icon-btn{border:none;background:var(--card);color:var(--muted);width:40px;height:40px;border-radius:12px;cursor:pointer}
.form-grid{display:grid;gap:12px}
.field{display:grid;gap:7px}
.label{font-size:13px;color:var(--muted);font-weight:700;letter-spacing:.03em;text-transform:uppercase}
.input,.select,.textarea{
  width:100%;background:#0f1419;border:1px solid var(--line-2);color:var(--text);border-radius:16px;padding:14px 14px;outline:none
}
.textarea{min-height:88px;resize:vertical}
.scope-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.choice-btn{
  border:1px solid var(--line-2);background:#11161b;color:var(--text);padding:14px;border-radius:16px;cursor:pointer;font-weight:700
}
.choice-btn.active{border-color:#2cc493;background:#10271f;box-shadow:inset 0 0 0 1px rgba(44,196,147,.25)}
.projects-box{background:#0d1217;border:1px solid var(--line);border-radius:18px;padding:12px;display:grid;gap:8px}
.project-check{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:12px}
.project-check input{width:18px;height:18px}
.actions-row{display:flex;gap:10px;position:sticky;bottom:-22px;padding-top:14px;background:linear-gradient(180deg,rgba(13,17,22,0) 0%,rgba(13,17,22,1) 25%)}
.btn{
  flex:1;border:none;border-radius:16px;padding:15px 14px;font-weight:800;cursor:pointer
}
.btn-primary{background:linear-gradient(180deg,#25b98d 0%,#1D9E75 100%);color:#fff}
.btn-secondary{background:#1b2127;color:#fff;border:1px solid var(--line)}
.manage-list{display:grid;gap:10px}
.manage-card{background:linear-gradient(180deg,#121820 0%,#0f1419 100%);border:1px solid var(--line);border-radius:18px;padding:14px}
.manage-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.manage-name{font-size:18px;font-weight:800;line-height:1.3}
.mini{font-size:13px;color:var(--muted)}
.tag-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.tag{font-size:12px;padding:6px 10px;border-radius:999px;font-weight:700}
.tag-blue{background:#13283b;color:#8dc5ff}
.tag-green{background:#10271f;color:#7fe2bc}
.tag-amber{background:#37270f;color:#f0bf68}
.tag-gray{background:#20262d;color:#c8d0d8}
.manage-actions{display:flex;gap:8px;margin-top:12px}
.btn-small{border:none;border-radius:12px;padding:10px 12px;font-weight:800;cursor:pointer}
.btn-edit{background:#173250;color:#9ed0ff}
.btn-delete{background:#3a181b;color:#ffb1b1}
.helper{font-size:13px;color:var(--muted);margin-top:4px}
@media (max-width:540px){
  .sheet{max-width:none}
  .fab-stack{right:14px;bottom:14px}
}

</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">Operaciones</div>
        <div class="header-sub">Versión estratégica flexible</div>
      </div>
      <div class="date-info" id="dateInfo"></div>
    </div>
    <select class="project-select" id="projectSelect" onchange="changeProject(this.value)"></select>
    <div class="tab-bar">
      <button class="tab active" data-tab="panel" onclick="switchTab('panel')">Panel</button>
      <button class="tab" data-tab="hoy" onclick="switchTab('hoy')">Hoy</button>
      <button class="tab" data-tab="semana" onclick="switchTab('semana')">Semana</button>
      <button class="tab" data-tab="mes" onclick="switchTab('mes')">Mes</button>
      <button class="tab" data-tab="trimestre" onclick="switchTab('trimestre')">Trim.</button>
    </div>
  </div>

  <div id="notify-area"></div>
  <div id="main-content"></div>

  <div class="fab-group">
    <button class="fab secondary" onclick="openTaskManager()" title="Gestionar tareas">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M4 7h16"/><path d="M4 12h10"/><path d="M4 17h7"/><circle cx="18" cy="17" r="3" /></svg>
    </button>
    <button class="fab" onclick="openAddTask()" title="Agregar tarea">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
    </button>
  </div>

  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal">
      <button class="close-modal" onclick="closeModal()">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>
</div>

<script>
const DAYS = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const PROJECTS = ['McK','UBER COE','UBER Bambú','UBER Cedral','LSEG','DXC','Bayer Metro','ADVAN','Contract Walker'];
const now = new Date();
const todayDay = now.getDay();
const todayDate = now.getDate();
const monthKey = `${now.getFullYear()}-${now.getMonth()}`;
const weekKey = `${now.getFullYear()}-W${getWeekNum(now)}`;
let currentProject = loadState('current_project','GLOBAL');
let currentTab = loadState('current_tab','panel');
let notifyGranted = loadState('notify', false);

function getWeekNum(d){
  const s = new Date(d.getFullYear(),0,1);
  return Math.ceil(((d-s)/86400000+s.getDay()+1)/7);
}
function getQKey(){
  const q = Math.ceil((now.getMonth()+1)/3);
  return `${now.getFullYear()}-Q${q}`;
}
function loadState(key, def){ try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; }catch(e){ return def; } }
function saveState(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} }
function projectStateKey(prefix, scope, project){ return `${prefix}_${scope}_${project}` }
function checkIcon(){ return `<svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg>`; }
function uid(prefix='c'){ return prefix + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,7); }
function safe(text=''){ return String(text).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }

const DEFAULT_WEEKLY_TASKS = [
  {id:'w1',name:'Planilla semanal',day:1,badge:'Lunes',category:'weekly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'w2',name:'Control de horas',day:2,badge:'Martes',category:'weekly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'w3',name:'Presupuesto',day:2,badge:'Martes',category:'weekly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'w4',name:'Trámite caja chica',day:2,badge:'Martes',category:'weekly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'w5',name:'Reporte semanal de operaciones',day:2,badge:'Martes',category:'weekly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'w6',name:'Enviar reporte operaciones al cliente',day:3,badge:'Máx. miércoles',category:'weekly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'w7',name:'Embarcar caja chica (pago viernes)',day:3,badge:'Antes del mediodía miérc.',category:'weekly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'w8',name:'Revisar 4insite',day:-1,badge:'Cada 2 días',recurring:true,category:'weekly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'w9',name:'Embarcar facturas',day:-1,badge:'Cada 2 días',recurring:true,category:'weekly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'w10',name:'Subir hojas bitácoras semana anterior a carpetas',day:1,badge:'Lunes',category:'weekly',scopeType:'project',projects:[...PROJECTS],system:true},
];
const DEFAULT_MONTHLY_TASKS = [
  {id:'m1',name:'Reporte mensual',deadline:5,badge:'Máx. día 5',category:'monthly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'m2',name:'Reporte KPIs',deadline:7,badge:'1ª semana del mes',category:'monthly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'m3',name:'Cargador de capacitaciones — envío a RH',deadline:10,badge:'Máx. día 10',category:'monthly',scopeType:'global',system:true},
  {id:'m4',name:'Recordar subir pedidos a todos',deadline:10,badge:'Máx. día 10',category:'monthly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'m5',name:'Enviar ajustes de presupuesto a RH',deadline:13,badge:'Antes del 13',category:'monthly',scopeType:'global',system:true},
  {id:'m6',name:'Cotizar pedidos clientes',deadline:18,badge:'Máx. día 18',category:'monthly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'m7',name:'Enviar encuesta cliente',deadline:18,badge:'Máx. día 18',category:'monthly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'m8',name:'Montar pedidos proyectos en sistema',deadline:19,badge:'Máx. día 19',category:'monthly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'m9',name:'Reintegro de gastos',deadline:22,badge:'Máx. día 22',category:'monthly',scopeType:'global',system:true},
  {id:'m10',name:'Montar pedidos clientes en sistema',deadline:23,badge:'Máx. día 23',category:'monthly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'m11',name:'Revisar todo embarcado — sin pendientes de pedidos',deadline:24,badge:'Máx. día 24',category:'monthly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'m12',name:'Reporte de ingresos extraordinarios',deadline:25,badge:'Máx. día 25',category:'monthly',scopeType:'global',system:true},
  {id:'m13',name:'Enviar convocatoria presentación resumen métricas',deadline:25,badge:'Máx. día 25',category:'monthly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'m14',name:'Subir logros, retos y próximos 30 días a 4insite',deadline:25,badge:'Máx. día 25',category:'monthly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'m15',name:'Reporte cotizaciones del mes a Contabilidad',deadline:28,badge:'Fin de mes',category:'monthly',scopeType:'global',system:true},
  {id:'m16',name:'Revisar resumen métricas con el cliente',deadline:5,badge:'Máx. día 5 (mes sig.)',category:'monthly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'m17',name:'Subir evaluaciones proveedores a carpeta',deadline:30,badge:'Máx. día 30',category:'monthly',scopeType:'project',projects:[...PROJECTS],system:true},
];
const DEFAULT_QUARTERLY_TASKS = [
  {id:'q1',name:'Montar borrador QBR',badge:'Máx. día 8 mes siguiente al cierre',category:'quarterly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'q2',name:'Enviar convocatoria presentación QBR a clientes',badge:'Trimestral',category:'quarterly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'q3',name:'Presentar QBR a clientes',badge:'Máx. día 30 mes siguiente al cierre',category:'quarterly',scopeType:'project',projects:[...PROJECTS],system:true},
  {id:'q4',name:'Preparar evaluación personal para gerencia',badge:'Trimestral',category:'quarterly',scopeType:'global',system:true},
];

let customTasks = loadState('custom_tasks', []);
let deletedTaskIds = loadState('deleted_task_ids', []);
let weeklyDone = {};
let monthlyDone = {};
let quarterlyDone = {};
let globalWeeklyDone = loadState(projectStateKey('wd',weekKey,'GLOBAL'), {});
let globalMonthlyDone = loadState(projectStateKey('md',monthKey,'GLOBAL'), {});
let globalQuarterlyDone = loadState(projectStateKey('qd',getQKey(),'GLOBAL'), {});

function getAllTasks(category){
  let base = category === 'weekly' ? DEFAULT_WEEKLY_TASKS : category === 'monthly' ? DEFAULT_MONTHLY_TASKS : DEFAULT_QUARTERLY_TASKS;
  const customs = customTasks.filter(t => t.category === category);
  return [...base, ...customs].filter(t => !deletedTaskIds.includes(t.id));
}
function getTasksForSelection(category, selection){
  const all = getAllTasks(category);
  if(selection === 'GLOBAL'){
    return all.filter(t => t.scopeType === 'global');
  }
  return all.filter(t => t.scopeType === 'global' || (t.projects || []).includes(selection));
}
function getProjectOnlyTasks(category, project){
  return getAllTasks(category).filter(t => t.scopeType !== 'global' && (t.projects || []).includes(project));
}
function isDone(task){
  if(task.scopeType === 'global'){
    if(task.category === 'weekly') return !!globalWeeklyDone[task.id];
    if(task.category === 'monthly') return !!globalMonthlyDone[task.id];
    return !!globalQuarterlyDone[task.id];
  }
  if(task.category === 'weekly') return !!weeklyDone[task.id];
  if(task.category === 'monthly') return !!monthlyDone[task.id];
  return !!quarterlyDone[task.id];
}
function toggleTask(id, category){
  const task = getAllTasks(category).find(t => t.id === id);
  if(!task) return;
  let key, state;
  if(task.scopeType === 'global'){
    if(category === 'weekly'){ state = globalWeeklyDone; key = projectStateKey('wd', weekKey, 'GLOBAL'); }
    else if(category === 'monthly'){ state = globalMonthlyDone; key = projectStateKey('md', monthKey, 'GLOBAL'); }
    else { state = globalQuarterlyDone; key = projectStateKey('qd', getQKey(), 'GLOBAL'); }
  } else {
    if(category === 'weekly'){ state = weeklyDone; key = projectStateKey('wd', weekKey, currentProject); }
    else if(category === 'monthly'){ state = monthlyDone; key = projectStateKey('md', monthKey, currentProject); }
    else { state = quarterlyDone; key = projectStateKey('qd', getQKey(), currentProject); }
  }
  state[id] = !state[id];
  saveState(key, state);
  render();
}
function reloadProjectState(){
  weeklyDone = loadState(projectStateKey('wd', weekKey, currentProject), {});
  monthlyDone = loadState(projectStateKey('md', monthKey, currentProject), {});
  quarterlyDone = loadState(projectStateKey('qd', getQKey(), currentProject), {});
  globalWeeklyDone = loadState(projectStateKey('wd', weekKey, 'GLOBAL'), {});
  globalMonthlyDone = loadState(projectStateKey('md', monthKey, 'GLOBAL'), {});
  globalQuarterlyDone = loadState(projectStateKey('qd', getQKey(), 'GLOBAL'), {});
}
function listStateFor(project){
  return {
    w: loadState(projectStateKey('wd', weekKey, project), {}),
    m: loadState(projectStateKey('md', monthKey, project), {}),
    q: loadState(projectStateKey('qd', getQKey(), project), {})
  };
}
function listGlobalState(){
  return {
    w: loadState(projectStateKey('wd', weekKey, 'GLOBAL'), {}),
    m: loadState(projectStateKey('md', monthKey, 'GLOBAL'), {}),
    q: loadState(projectStateKey('qd', getQKey(), 'GLOBAL'), {})
  };
}
function changeProject(project){
  currentProject = project;
  saveState('current_project', project);
  reloadProjectState();
  render();
}
function switchTab(tab){
  currentTab = tab;
  saveState('current_tab', tab);
  document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
  render();
}

function taskScopePill(task){
  if(task.scopeType === 'global') return `<span class="scope-pill scope-global">Global</span>`;
  const count = (task.projects || []).length;
  if(count > 1) return `<span class="scope-pill scope-multi">${count} proyectos</span>`;
  return `<span class="scope-pill scope-project">${safe((task.projects||[])[0] || 'Proyecto')}</span>`;
}
function taskCard(task, done, overdue=false){
  const toggle = `toggleTask('${task.id}','${task.category}')`;
  let badgeClass = task.category === 'weekly' ? 'week' : task.category === 'monthly' ? 'month' : 'tri';
  if(task.custom) badgeClass = 'custom';
  return `<div class="task-card${done?' done':''}${overdue?' overdue':''}" onclick="${toggle}">
    <div class="check">${done ? checkIcon() : ''}</div>
    <div class="task-body">
      <div class="task-head">
        <div class="task-name">${safe(task.name)}</div>
        ${taskScopePill(task)}
      </div>
      <div class="task-meta">
        ${task.badge ? `<span class="badge badge-${badgeClass}">${safe(task.badge)}</span>` : ''}
        ${overdue && !done ? `<span class="badge badge-urgent">vencida</span>` : ''}
      </div>
    </div>
  </div>`;
}
function progressBar(done,total){
  const pct = total ? Math.round(done/total*100) : 0;
  return `<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="progress-text">${done}/${total} completadas</div></div>`;
}
function todayTasksForSelection(project){
  const weekly = getTasksForSelection('weekly', project).filter(t => t.day === todayDay || t.recurring).map(t => ({...t, overdue:false}));
  const monthly = getTasksForSelection('monthly', project).filter(t => t.deadline === todayDate || t.deadline === todayDate + 1).map(t => ({...t, overdue:false}));
  const overdue = getTasksForSelection('monthly', project).filter(t => t.deadline < todayDate && !doneForProject(t, project)).map(t => ({...t, overdue:true}));
  return [...weekly, ...monthly, ...overdue];
}
function doneForProject(task, project){
  if(task.scopeType === 'global'){
    const g = listGlobalState();
    if(task.category === 'weekly') return !!g.w[task.id];
    if(task.category === 'monthly') return !!g.m[task.id];
    return !!g.q[task.id];
  }
  const s = listStateFor(project);
  if(task.category === 'weekly') return !!s.w[task.id];
  if(task.category === 'monthly') return !!s.m[task.id];
  return !!s.q[task.id];
}
function monthlyOverduesForProject(project){
  return getTasksForSelection('monthly', project).filter(t => t.deadline < todayDate && !doneForProject(t, project));
}
function monthlySoonForProject(project){
  return getTasksForSelection('monthly', project).filter(t => !doneForProject(t, project) && t.deadline >= todayDate && t.deadline <= todayDate + 2);
}
function totalDoneForProject(project){
  let done = 0;
  ['weekly','monthly','quarterly'].forEach(cat=>{
    getTasksForSelection(cat, project).forEach(t => { if(doneForProject(t, project)) done++; });
  });
  return done;
}
function totalPossibleForProject(project){
  return getTasksForSelection('weekly', project).length + getTasksForSelection('monthly', project).length + getTasksForSelection('quarterly', project).length;
}
function riskLevel(project){
  const overdue = monthlyOverduesForProject(project).length;
  const soon = monthlySoonForProject(project).length;
  const todayOpen = todayTasksForSelection(project).filter(t => !doneForProject(t, project)).length;
  const score = overdue * 3 + soon * 2 + todayOpen;
  if(score >= 8) return {label:'Riesgo alto', cls:'high'};
  if(score >= 4) return {label:'Riesgo medio', cls:'medium'};
  return {label:'Riesgo bajo', cls:'low'};
}

function renderPanelGlobal(){
  const metrics = PROJECTS.map(project=>{
    const totalPossible = totalPossibleForProject(project);
    const done = totalDoneForProject(project);
    const overdue = monthlyOverduesForProject(project).length;
    const soon = monthlySoonForProject(project).length;
    const todayOpen = todayTasksForSelection(project).filter(t => !doneForProject(t, project)).length;
    return {project, totalPossible, done, overdue, soon, todayOpen, risk:riskLevel(project)};
  });
  const highRisk = metrics.filter(p => p.risk.cls === 'high').length;
  const mediumRisk = metrics.filter(p => p.risk.cls === 'medium').length;
  const best = [...metrics].sort((a,b) => (b.done/(b.totalPossible||1)) - (a.done/(a.totalPossible||1)))[0];
  const urgent = [...metrics].sort((a,b) => (b.overdue+b.soon+b.todayOpen) - (a.overdue+a.soon+a.todayOpen))[0];
  const globalCount = getTasksForSelection('weekly','GLOBAL').length + getTasksForSelection('monthly','GLOBAL').length + getTasksForSelection('quarterly','GLOBAL').length;

  let html = `<div class="hero"><div class="hero-grid">
    <div class="stat-card"><div class="stat-label">Proyectos</div><div class="stat-value">${PROJECTS.length}</div><div class="stat-sub">activos en control</div></div>
    <div class="stat-card"><div class="stat-label">Riesgo alto</div><div class="stat-value">${highRisk}</div><div class="stat-sub">requieren foco inmediato</div></div>
    <div class="stat-card"><div class="stat-label">Riesgo medio</div><div class="stat-value">${mediumRisk}</div><div class="stat-sub">hay que vigilar</div></div>
    <div class="stat-card"><div class="stat-label">Tareas globales</div><div class="stat-value">${globalCount}</div><div class="stat-sub">comparten todos los proyectos</div></div>
  </div></div>`;

  html += `<div class="section"><div class="section-label">Hoy lo crítico</div>`;
  if(urgent){
    html += `<div class="focus-card"><div class="kicker">Prioridad principal</div><div class="mini-title">${safe(urgent.project)}</div><div class="mini-sub">Pendientes hoy: ${urgent.todayOpen} · Próximas/vencidas: ${urgent.overdue + urgent.soon}</div><div class="summary-block"><strong>${urgent.risk.label}</strong><p>Empieza aquí si quieres bajar el riesgo más rápido.</p></div></div>`;
  }
  if(best){
    html += `<div class="summary-card" style="margin-top:10px"><div class="mini-title">Mejor avance actual</div><div class="mini-sub">${safe(best.project)} · ${best.done}/${best.totalPossible} marcadas</div></div>`;
  }
  html += `</div>`;

  html += `<div class="section"><div class="section-label">Mapa de proyectos</div><div class="project-grid">`;
  metrics.sort((a,b)=>(b.overdue+b.soon+b.todayOpen) - (a.overdue+a.soon+a.todayOpen)).forEach(p=>{
    html += `<div class="project-card" onclick="changeProject('${safe(p.project)}');switchTab('panel')">
      <div>
        <div class="project-name">${safe(p.project)}</div>
        <div class="project-stats">${p.done}/${p.totalPossible} marcadas · Hoy abiertas: ${p.todayOpen} · Próximas/vencidas: ${p.overdue+p.soon}</div>
      </div>
      <div class="status-pill status-risk-${p.risk.cls}">${p.risk.label}</div>
    </div>`;
  });
  html += `</div></div>`;

  html += `<div class="section"><div class="section-label">Resumen ejecutivo</div><div class="summary-card"><div class="mini-title">Lectura rápida</div><p class="note">Ahora puedes definir si una tarea es global o solo de ciertos proyectos. Eso evita marcar como hecho algo que realmente solo resolviste en un cliente.</p></div></div>`;
  return html;
}

function renderPanelProject(){
  const items = todayTasksForSelection(currentProject);
  const open = items.filter(t => !doneForProject(t, currentProject));
  const overdue = monthlyOverduesForProject(currentProject);
  const soon = monthlySoonForProject(currentProject);
  const totalPossible = totalPossibleForProject(currentProject);
  const done = totalDoneForProject(currentProject);
  const risk = riskLevel(currentProject);

  let html = `<div class="hero"><div class="hero-grid">
    <div class="stat-card"><div class="stat-label">Proyecto</div><div class="stat-value" style="font-size:20px">${safe(currentProject)}</div><div class="stat-sub">panel operativo</div></div>
    <div class="stat-card"><div class="stat-label">Riesgo</div><div class="stat-value" style="font-size:20px">${risk.label}</div><div class="stat-sub">según urgencias abiertas</div></div>
    <div class="stat-card"><div class="stat-label">Pendientes hoy</div><div class="stat-value">${open.length}</div><div class="stat-sub">para atacar primero</div></div>
    <div class="stat-card"><div class="stat-label">Avance</div><div class="stat-value">${done}</div><div class="stat-sub">de ${totalPossible} marcadas</div></div>
  </div></div>`;

  html += `<div class="section"><div class="section-label">Hoy lo crítico</div>`;
  if(open.length === 0){
    html += `<div class="focus-card"><div class="mini-title">Buen control 👏</div><div class="mini-sub">No tienes tareas abiertas para hoy en este proyecto.</div></div>`;
  } else {
    html += `<div class="focus-card"><div class="kicker">Enfoque del día</div>`;
    open.slice(0,5).forEach(t => { html += taskCard(t, false, !!t.overdue); });
    html += `</div>`;
  }
  html += `</div>`;

  html += `<div class="section"><div class="section-label">Alertas</div>`;
  html += `<div class="summary-card"><div class="mini-title">${overdue.length} vencidas · ${soon.length} próximas 48h</div><p class="note">Aquí se te puede acumular problema si no lo bajas a tiempo.</p></div></div>`;
  return html;
}

function renderHoy(){
  const selection = currentProject;
  const items = todayTasksForSelection(selection);
  let html = `<div class="section"><div class="section-label">Hoy — ${DAYS[todayDay]} ${todayDate} de ${MONTHS[now.getMonth()]}</div>`;
  if(!items.length){
    html += `<div class="empty-state">No hay tareas urgentes para hoy 🎉</div></div>`;
    return html;
  }
  let done = 0;
  items.forEach(t => {
    const isDone = selection === 'GLOBAL' ? doneForProject(t, 'GLOBAL') : doneForProject(t, currentProject);
    if(isDone) done++;
    html += taskCard(t, isDone, !!t.overdue);
  });
  html += `</div>` + progressBar(done, items.length);
  return html;
}

function renderSemana(){
  const tasks = getTasksForSelection('weekly', currentProject);
  const groups = {};
  tasks.forEach(t => {
    const key = t.day >= 0 ? t.day : 8;
    if(!groups[key]) groups[key] = [];
    groups[key].push(t);
  });
  const labels = {1:'Lunes',2:'Martes',3:'Miércoles',4:'Jueves',5:'Viernes',6:'Sábado',0:'Domingo',8:'Recurrentes (cada 2 días)'};
  const order = [0,1,2,3,4,5,6,8];
  let html = '', total = 0, done = 0;
  order.forEach(d => {
    if(!groups[d] || !groups[d].length) return;
    html += `<div class="day-header">${labels[d] || 'Día'}${d === todayDay ? '<span class="today-chip">Hoy</span>' : ''}</div><div class="section" style="padding-top:6px">`;
    groups[d].forEach(t => {
      const isDone = currentProject === 'GLOBAL' ? doneForProject(t, 'GLOBAL') : doneForProject(t, currentProject);
      total++; if(isDone) done++;
      html += taskCard(t, isDone, false);
    });
    html += `</div>`;
  });
  return html + progressBar(done, total);
}

function renderMes(){
  const tasks = [...getTasksForSelection('monthly', currentProject)].sort((a,b) => a.deadline - b.deadline);
  let html = '', total = 0, done = 0, lastGroup = '';
  tasks.forEach(t => {
    const group = t.deadline <= 10 ? 'Primeros 10 días' : t.deadline <= 20 ? 'Del 11 al 20' : 'Del 21 al 31';
    if(group !== lastGroup){
      if(lastGroup) html += `</div>`;
      html += `<div class="section"><div class="section-label">${group}</div>`;
      lastGroup = group;
    }
    const isDoneNow = currentProject === 'GLOBAL' ? doneForProject(t, 'GLOBAL') : doneForProject(t, currentProject);
    const overdue = t.deadline < todayDate && !isDoneNow;
    total++; if(isDoneNow) done++;
    html += taskCard(t, isDoneNow, overdue);
  });
  if(lastGroup) html += `</div>`;
  return html + progressBar(done, total);
}

function renderTrimestre(){
  const tasks = getTasksForSelection('quarterly', currentProject);
  let html = `<div class="section"><div class="section-label">Trimestre actual</div>`, total = 0, done = 0;
  tasks.forEach(t => {
    const isDoneNow = currentProject === 'GLOBAL' ? doneForProject(t, 'GLOBAL') : doneForProject(t, currentProject);
    total++; if(isDoneNow) done++;
    html += taskCard(t, isDoneNow, false);
  });
  html += `</div>`;
  return html + progressBar(done, total);
}

function requestNotify(){
  if(!('Notification' in window)){ alert('Tu navegador no soporta notificaciones'); return; }
  Notification.requestPermission().then(p => {
    if(p === 'granted'){
      notifyGranted = true; saveState('notify', true);
      new Notification('Operaciones', {body:'Recordatorios activados ✓'});
      scheduleReminders();
    }
    render();
  });
}
function scheduleReminders(){
  const sel = currentProject === 'GLOBAL' ? 'GLOBAL' : currentProject;
  const soon = monthlySoonForProject(sel);
  if(soon.length && notifyGranted && Notification.permission === 'granted'){
    setTimeout(() => new Notification('Tareas próximas', {body:`${soon.length} tarea(s) vencen en 0-2 días`}), 2500);
  }
}

function selectFreq(el, freq){
  document.querySelectorAll('[data-freq]').forEach(b => b.classList.toggle('active', b === el));
  document.getElementById('weeklyFields').style.display = freq === 'weekly' ? 'block' : 'none';
  document.getElementById('monthlyFields').style.display = freq === 'monthly' ? 'block' : 'none';
}
function selectScope(el, scope){
  document.querySelectorAll('[data-scope]').forEach(b => b.classList.toggle('active', b === el));
  document.getElementById('projectScopeBox').style.display = scope === 'project' ? 'block' : 'none';
}
function toggleProjectChip(el){ el.classList.toggle('active'); }
function getSelectedFreq(){ const el = document.querySelector('[data-freq].active'); return el ? el.dataset.freq : 'weekly'; }
function getSelectedScope(){ const el = document.querySelector('[data-scope].active'); return el ? el.dataset.scope : 'global'; }

function saveNewTask(){
  const name = (document.getElementById('newTaskName').value || '').trim();
  const badge = (document.getElementById('newTaskBadge').value || '').trim();
  const freq = getSelectedFreq();
  const scopeType = getSelectedScope();
  const selectedProjects = [...document.querySelectorAll('.project-chip.active')].map(el => el.dataset.project);
  if(!name){ alert('Escribe el nombre de la tarea.'); return; }
  if(scopeType === 'project' && !selectedProjects.length){ alert('Escoge al menos un proyecto.'); return; }

  const task = {
    id: uid(freq[0]),
    name,
    badge: badge || (freq === 'weekly' ? 'Semanal' : freq === 'monthly' ? 'Mensual' : 'Trimestral'),
    category: freq,
    scopeType,
    projects: scopeType === 'project' ? selectedProjects : [],
    custom: true
  };
  if(freq === 'weekly'){
    task.day = parseInt(document.getElementById('newTaskDay').value, 10);
    if(task.day === -1) task.recurring = true;
  }
  if(freq === 'monthly'){
    const deadline = parseInt(document.getElementById('newTaskDeadline').value, 10);
    if(!deadline || deadline < 1 || deadline > 31){ alert('La fecha límite mensual debe ir de 1 a 31.'); return; }
    task.deadline = deadline;
  }
  customTasks.push(task);
  saveState('custom_tasks', customTasks);
  closeModal();
  render();
}

    all.forEach(t => {
      const scopeText = t.scopeType === 'global' ? 'Global' : (t.projects || []).join(', ');
      const freqText = t.category === 'weekly' ? 'Semanal' : t.category === 'monthly' ? 'Mensual' : 'Trimestral';
      html += `<div class="manager-card">
        <div class="manager-top">
          <div>
            <div class="manager-name">${safe(t.name)}</div>
            <div class="manager-meta">${freqText} · ${safe(scopeText || '')}</div>
          </div>
          ${taskScopePill(t)}
        </div>
        <div class="manager-actions">
          <button class="danger-btn" onclick="deleteTask('${t.id}')">Eliminar</button>
        </div>
      </div>`;
    });
  }
  html += `<div class="action-row"><button class="secondary-btn" onclick="closeModal()">Cerrar</button></div>`;
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}

function deleteTask(id){
  if(!confirm('¿Eliminar esta tarea?')){
    return;
  }
  customTasks = customTasks.filter(t => t.id !== id);
  saveState('custom_tasks', customTasks);
  if(!deletedTaskIds.includes(id)){
    deletedTaskIds.push(id);
    saveState('deleted_task_ids', deletedTaskIds);
  }
  // also clear completion marks from all states
  [projectStateKey('wd', weekKey, 'GLOBAL'), projectStateKey('md', monthKey, 'GLOBAL'), projectStateKey('qd', getQKey(), 'GLOBAL')]
    .forEach(key => {
      const s = loadState(key, {});
      if(s[id]){ delete s[id]; saveState(key, s); }
    });
  PROJECTS.forEach(p => {
    [projectStateKey('wd', weekKey, p), projectStateKey('md', monthKey, p), projectStateKey('qd', getQKey(), p)]
      .forEach(key => {
        const s = loadState(key, {});
        if(s[id]){ delete s[id]; saveState(key, s); }
      });
  });
  reloadProjectState();
  openTaskManager();
  render();
}

function render(){
  reloadProjectState();
  document.getElementById('projectSelect').innerHTML = `<option value="GLOBAL">Vista general / tareas globales</option>` + PROJECTS.map(p => `<option value="${safe(p)}"${p===currentProject?' selected':''}>${safe(p)}</option>`).join('');
  const nc = document.getElementById('notify-area');
  nc.innerHTML = notifyGranted
    ? `<div class="notify-banner"><div class="dot dot-green"></div>Notificaciones activas</div>`
    : `<div class="notify-banner off" onclick="requestNotify()"><div class="dot dot-gray"></div>Activar recordatorios del navegador →</div>`;

  document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === currentTab));

  let html = '';
  if(currentTab === 'panel') html = currentProject === 'GLOBAL' ? renderPanelGlobal() : renderPanelProject();
  else if(currentTab === 'hoy') html = renderHoy();
  else if(currentTab === 'semana') html = renderSemana();
  else if(currentTab === 'mes') html = renderMes();
  else html = renderTrimestre();

  document.getElementById('main-content').innerHTML = html;
}

document.getElementById('dateInfo').textContent = `${DAYS[todayDay]} ${todayDate} ${MONTHS[now.getMonth()]}`;
reloadProjectState();
render();
if(notifyGranted && Notification.permission === 'granted') scheduleReminders();
</script>

</div>

    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div class="sheet-title" id="taskSheetTitle">Nueva tarea</div>
      <button class="icon-btn" onclick="closeSheet(null,'taskSheetOverlay')">✕</button>
    </div>

      <div class="field">
        <label class="label">Nombre de la tarea</label>
        <input id="taskNameInput" class="input" placeholder="Ej. Enviar encuesta cliente" />
      </div>

      <div class="field">
        <label class="label">Frecuencia</label>
        <select id="taskFreqInput" class="select" onchange="renderDynamicFields()">
          <option value="weekly">Semanal</option>
          <option value="monthly">Mensual</option>
          <option value="quarterly">Trimestral</option>
        </select>
      </div>

      <div id="dynamicFields"></div>

      <div class="field">
        <label class="label">Etiqueta</label>
        <input id="taskBadgeInput" class="input" placeholder="Ej. Máx. día 18 / Lunes / Trimestral" />
      </div>

      <div class="field">
        <label class="label">Alcance</label>
        <div class="scope-row">
          <button type="button" id="scopeGlobalBtn" class="choice-btn active" onclick="setScopeType('global')">Global</button>
          <button type="button" id="scopeProjectBtn" class="choice-btn" onclick="setScopeType('project')">Por proyecto</button>
        </div>
        <div class="helper">Global se marca una sola vez. Por proyecto se marca por cliente.</div>
      </div>

      <div class="field" id="projectChooserWrap" style="display:none">
        <label class="label">Aplicar a proyectos</label>
        <div class="projects-box" id="projectChooser"></div>
      </div>
    </div>
    <div class="actions-row">
      <button class="btn btn-secondary" onclick="closeSheet(null,'taskSheetOverlay')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveTask()">Guardar tarea</button>
    </div>
  </div>
</div>

<div class="sheet-overlay" id="manageSheetOverlay" onclick="closeSheet(event,'manageSheetOverlay')">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div class="sheet-title">Gestionar tareas</div>
      <button class="icon-btn" onclick="closeSheet(null,'manageSheetOverlay')">✕</button>
    </div>
    <div class="helper" style="margin-bottom:12px">Aquí puedes editar o eliminar tareas creadas por ti.</div>
    <div class="manage-list" id="manageList"></div>
  </div>
</div>
